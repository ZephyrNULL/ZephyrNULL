name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # Runs daily at 3 AM
  workflow_dispatch: # Allows you to run it manually

# Grant necessary write permissions to push back to the repository
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=ZephyrNULL&show_icons=true&theme=dark
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          
          # Create the directory if it doesn't exist to prevent git add from crashing
          mkdir -p profile
          
          # Safely stage the SVGs if they exist
          if ls profile/*.svg 1> /dev/null 2>&1; then
            git add profile/*.svg
            
            # Commit and push only if there are changes to avoid empty commit errors
            if ! git diff-index --quiet HEAD; then
              git commit -m "Update README cards"
              git push
            else
              echo "No changes detected. Skipping commit."
            fi
          else
            echo "Error: No SVG cards found in the profile/ directory."
            exit 1
          fi
